<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特区民泊 チェックインシステム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-900:#16233a;
    --ink-800:#1c2c46;
    --ink-700:#24384f;
    --paper:#eeeee5;
    --paper-card:#f8f7f2;
    --brass:#b8874e;
    --brass-dark:#8f6535;
    --stamp-red:#a8443c;
    --success:#3f7a63;
    --text:#1b2430;
    --muted:#6e7a82;
    --line:#d8d4c6;
    --danger:#a8443c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, #1e2f4a 0%, transparent 60%),
      var(--paper);
    color:var(--text);
    font-family:"Noto Sans JP","Noto Sans KR","Noto Sans SC","Noto Sans TC", sans-serif;
    min-height:100vh;
    padding:32px 16px 80px;
  }
  .mono{font-family:"JetBrains Mono", monospace;}
  .serif{font-family:"Shippori Mincho", serif;}

  .app{
    max-width:640px;
    margin:0 auto;
  }

  /* ---------- Header ---------- */
  .brandbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:22px;
    padding:0 4px;
  }
  .brandleft{display:flex;align-items:center;gap:12px;}
  .langswitch{
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:20px;
    padding:7px 14px;
    font-size:12px;font-weight:700;
    color:var(--ink-700);
    font-family:inherit;
    cursor:pointer;
    white-space:nowrap;
  }
  .langswitch:hover{border-color:var(--brass);}

  /* ---------- Language gate ---------- */
  .langgate-card{
    background:var(--paper-card);
    border-radius:14px;
    box-shadow:0 18px 40px -18px rgba(22,35,58,.35);
    border:1px solid var(--line);
    padding:36px 26px 30px;
    text-align:center;
  }
  .langgate-mark{
    width:52px;height:52px;border-radius:13px;
    background:var(--ink-900);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 20px;
  }
  .langgate-mark svg{width:26px;height:26px;}
  .langgate-title{
    font-family:"Shippori Mincho",serif;
    font-size:16px;font-weight:700;color:var(--ink-900);
    line-height:1.9;
    margin:0 0 26px;
  }
  .langlist{display:flex;flex-direction:column;gap:10px;}
  .langbtn{
    display:flex;align-items:center;justify-content:center;
    padding:14px 16px;
    border-radius:11px;
    border:1.5px solid var(--line);
    background:#fff;
    font-family:inherit;
    font-size:15px;font-weight:700;
    color:var(--text);
    cursor:pointer;
    transition:border-color .15s, background .15s, transform .1s;
  }
  .langbtn:hover{border-color:var(--brass);background:#fbf3e8;}
  .langbtn:active{transform:scale(.98);}
  .langbtn:disabled{opacity:.45;cursor:not-allowed;}
  .langgate-loading{
    margin-top:16px;font-size:12.5px;font-weight:700;color:var(--brass-dark);
  }
  .brandmark{
    width:38px;height:38px;border-radius:9px;
    background:var(--ink-900);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .brandmark svg{width:20px;height:20px;}
  .brandtext .eyebrow{
    font-size:11px;letter-spacing:.14em;color:var(--muted);
    font-weight:700;
  }
  .brandtext .title{
    font-family:"Shippori Mincho",serif;
    font-size:19px;font-weight:700;color:var(--ink-900);
    letter-spacing:.02em;
  }

  /* ---------- Ticket progress ---------- */
  .ticket-strip{
    display:flex;
    background:var(--ink-900);
    border-radius:14px 14px 0 0;
    position:relative;
    overflow:hidden;
  }
  .ticket-strip::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:0;
    height:0;
    border-bottom:2px dashed rgba(255,255,255,.14);
  }
  .step{
    flex:1;
    padding:14px 6px 12px;
    text-align:center;
    position:relative;
    cursor:default;
    color:rgba(255,255,255,.42);
    transition:color .25s;
  }
  .step + .step::before{
    content:"";
    position:absolute;left:0;top:16px;bottom:16px;
    width:1px;background:rgba(255,255,255,.12);
  }
  .step .num{
    display:block;
    font-family:"JetBrains Mono",monospace;
    font-size:11px;
    letter-spacing:.08em;
    margin-bottom:3px;
  }
  .step .label{
    display:block;
    font-size:12.5px;
    font-weight:700;
  }
  .step.active{color:#fff;}
  .step.active .num{color:var(--brass);}
  .step.done{color:rgba(255,255,255,.78);}
  .step .stampdot{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--brass);margin-right:4px;
    vertical-align:middle;
  }

  /* ---------- Card ---------- */
  .card{
    background:var(--paper-card);
    border-radius:0 0 14px 14px;
    box-shadow:0 18px 40px -18px rgba(22,35,58,.35);
    border:1px solid var(--line);
    border-top:none;
    position:relative;
  }
  .perf{
    position:relative;
    height:0;
  }
  .card-inner{
    padding:26px 24px 28px;
  }
  .screen{display:none;}
  .screen.active{display:block;animation:fadein .35s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  h2.scr-title{
    font-family:"Shippori Mincho",serif;
    font-size:20px;
    margin:0 0 4px;
    color:var(--ink-900);
  }
  p.scr-sub{
    margin:0 0 22px;
    font-size:13px;
    color:var(--muted);
    line-height:1.7;
  }
  .section{margin-bottom:26px;}
  .section-head{
    display:flex;align-items:baseline;gap:8px;
    margin-bottom:12px;
    padding-bottom:6px;
    border-bottom:1px solid var(--line);
  }
  .section-head .tag{
    font-family:"JetBrains Mono",monospace;
    font-size:10px;color:var(--brass-dark);
    letter-spacing:.06em;
    border:1px solid var(--brass);
    border-radius:20px;
    padding:2px 8px;
  }
  .section-head h3{
    margin:0;font-size:14.5px;font-weight:700;color:var(--ink-900);
  }

  label{
    display:block;
    font-size:12.5px;
    font-weight:700;
    color:var(--ink-700);
    margin-bottom:6px;
  }
  .req::after{
    content:" 必須";
    font-size:10px;
    color:#fff;
    background:var(--stamp-red);
    border-radius:4px;
    padding:1px 5px;
    margin-left:6px;
    font-weight:700;
    vertical-align:middle;
  }
  .field{margin-bottom:16px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  input[type=text],input[type=tel],input[type=email],input[type=number],select{
    width:100%;
    padding:11px 12px;
    border:1.5px solid var(--line);
    border-radius:9px;
    background:#fff;
    font-size:14px;
    font-family:inherit;
    color:var(--text);
    outline:none;
    transition:border-color .15s;
  }
  input:focus,select:focus{border-color:var(--brass);}
  .hint{font-size:11.5px;color:var(--muted);margin-top:5px;}

  .radiogroup{display:flex;gap:10px;flex-wrap:wrap;}
  .radiogroup label.opt{
    flex:1;
    min-width:150px;
    display:flex;align-items:center;gap:8px;
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:12px 12px;
    font-weight:500;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    background:#fff;
  }
  .radiogroup input{width:15px;height:15px;accent-color:var(--brass-dark);}
  .radiogroup label.opt.checked{
    border-color:var(--brass);
    background:#fbf3e8;
  }

  .upload-slot{
    border:1.5px dashed var(--line);
    border-radius:11px;
    padding:16px;
    background:#fff;
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .upload-slot:hover{border-color:var(--brass);background:#fefaf4;}
  .upload-slot.filled{border-style:solid;border-color:var(--success);background:#f2f8f5;}
  .upload-slot .icon{
    width:38px;height:38px;border-radius:8px;
    background:var(--ink-900);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .upload-slot .icon svg{width:18px;height:18px;}
  .upload-slot.filled .icon{background:var(--success);}
  .upload-slot .meta .t{font-size:13px;font-weight:700;color:var(--text);}
  .upload-slot .meta .s{font-size:11.5px;color:var(--muted);margin-top:2px;}

  .guestcard{
    border:1px solid var(--line);
    border-radius:11px;
    padding:14px 14px 4px;
    background:#fff;
    margin-bottom:12px;
  }
  .guestcard .ghead{
    display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:6px 10px;
    margin-bottom:10px;
  }
  .ghead .gname{font-size:12.5px;font-weight:800;color:var(--brass-dark);}
  .samewrap{
    display:flex;align-items:center;gap:7px;
    font-size:12.5px;font-weight:500;color:var(--ink-700);
    margin-bottom:8px;cursor:pointer;
  }
  .samewrap input{width:15px;height:15px;accent-color:var(--brass-dark);}
  .guestcard input[disabled]{
    background:#f1efe6;color:var(--muted);
  }
  .addr-copy-disp{
    font-size:12.5px;
    color:var(--ink-700);
    background:#f1efe6;
    border:1px dashed var(--line);
    border-radius:8px;
    padding:9px 11px;
    margin-bottom:4px;
  }
  .ziprow{display:flex;gap:8px;}
  .ziprow input{flex:1;}
  .zipbtn{
    flex-shrink:0;
    padding:0 14px;
    border-radius:9px;
    border:1.5px solid var(--brass);
    background:#fbf3e8;
    color:var(--brass-dark);
    font-size:12.5px;font-weight:700;
    font-family:inherit;
    cursor:pointer;
  }
  .zipbtn:hover{background:var(--brass);color:#fff;}
  .zipstatus{font-size:11px;margin-top:6px;min-height:14px;line-height:1.5;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 20px;
    border-radius:10px;
    border:none;
    font-size:14.5px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
    transition:transform .12s, box-shadow .12s, opacity .15s;
    width:100%;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--ink-900);color:#fff;}
  .btn-primary:hover{box-shadow:0 8px 18px -8px rgba(22,35,58,.5);}
  .btn-brass{background:var(--brass);color:#22160a;}
  .btn-brass:hover{box-shadow:0 8px 18px -8px rgba(184,135,78,.6);}
  .btn-ghost{background:transparent;color:var(--ink-700);border:1.5px solid var(--line);}
  .btn[disabled]{opacity:.4;cursor:not-allowed;}
  .btnrow{display:flex;gap:10px;margin-top:22px;}

  .banner{
    display:flex;gap:10px;
    background:#fdf6ec;
    border:1px solid #ecd9b8;
    border-radius:10px;
    padding:12px 13px;
    font-size:12.5px;
    color:#6b4d1e;
    line-height:1.6;
    margin-bottom:20px;
  }
  .banner b{color:var(--brass-dark);}
  .banner-error{
    background:#fbebe9;
    border-color:#e3b3ac;
    color:#7a2c25;
  }
  .banner-error b{color:var(--stamp-red);}

  /* ---------- Confirmation ---------- */
  .summary-row{
    display:flex;justify-content:space-between;
    padding:9px 0;
    border-bottom:1px dashed var(--line);
    font-size:13px;
  }
  .summary-row:last-child{border-bottom:none;}
  .summary-row .k{color:var(--muted);}
  .summary-row .v{font-weight:700;color:var(--text);text-align:right;}

  /* ---------- Face auth status stamp (embedded in guest card) ---------- */
  .facethumb{
    width:64px;height:64px;border-radius:11px;
    object-fit:cover;
    border:1.5px solid var(--line);
    flex-shrink:0;
  }
  .gstamp{
    font-size:10px;font-weight:800;
    padding:3px 10px;
    border-radius:20px;
    white-space:nowrap;
    flex-shrink:0;
    letter-spacing:.02em;
  }
  .gstamp-pending{
    background:#f1efe6;color:var(--muted);
    border:1px dashed var(--line);
  }
  .gstamp-current{
    background:#fbf3e8;color:var(--brass-dark);
    border:1px solid var(--brass);
  }
  .gstamp-done{
    background:transparent;
    color:var(--stamp-red);
    border:2.5px solid var(--stamp-red);
    font-family:"Shippori Mincho",serif;
    font-size:13px;
    font-weight:800;
    padding:4px 14px;
    cursor:pointer;
  }
  button.gstamp{ -webkit-appearance:none; appearance:none; }

  .facequeue{
    font-size:12.5px;font-weight:800;color:var(--brass-dark);
    margin-bottom:10px;
  }
  .camframe{
    width:100%;
    aspect-ratio:4/3;
    background:linear-gradient(160deg,#0f1a2c,#1c2c46);
    border-radius:14px;
    position:relative;
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    margin-bottom:10px;
  }
  .camframe .guide{
    width:56%;height:72%;
    border:2.5px dashed rgba(184,135,78,.7);
    border-radius:50% / 40%;
    position:absolute;
  }
  .camframe .silhouette{
    width:44%;
    opacity:.55;
  }
  .camframe .flash{
    position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;
  }
  .camframe .cap-badge{
    position:absolute;top:10px;left:10px;
    background:rgba(0,0,0,.4);
    color:#fff;font-size:10.5px;font-family:"JetBrains Mono",monospace;
    padding:4px 8px;border-radius:6px;
    display:flex;align-items:center;gap:5px;
  }
  .cap-badge .dot{width:6px;height:6px;border-radius:50%;background:#e0554b;animation:blink 1.4s infinite;}
  @keyframes blink{50%{opacity:.2;}}

  .facestatus{font-size:12.5px;color:var(--success);text-align:center;font-weight:700;margin-top:10px;min-height:16px;}
  .locstatus{font-size:11.5px;color:var(--muted);text-align:center;margin-top:4px;min-height:14px;}
  .locpermhint{white-space:pre-line;line-height:1.8;}

  .stamp{
    width:104px;height:104px;
    border:4px solid var(--stamp-red);
    border-radius:50%;
    color:var(--stamp-red);
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    margin:8px auto 16px;
    transform:scale(0) rotate(-18deg);
    opacity:0;
    font-family:"Shippori Mincho",serif;
  }
  .stamp.show{
    animation:stampin .5s cubic-bezier(.2,1.6,.4,1) forwards;
  }
  @keyframes stampin{
    to{transform:scale(1) rotate(-8deg);opacity:.92;}
  }
  .stamp .s1{font-size:20px;font-weight:800;line-height:1;}
  .stamp .s2{font-size:10px;letter-spacing:.1em;margin-top:3px;}

  .center{text-align:center;}
  .mt8{margin-top:8px;}
  .small{font-size:11.5px;color:var(--muted);}

  footer.note{
    max-width:640px;margin:18px auto 0;
    font-size:11.5px;color:var(--muted);
    text-align:center;line-height:1.7;
  }
</style>
</head>
<body>

<div class="app">

  <div class="brandbar">
    <div class="brandleft">
      <div class="brandmark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 4l9 6.5" stroke="#f6f3ec" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 9.5V19a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1V9.5" stroke="#f6f3ec" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="brandtext">
        <div class="eyebrow" data-i18n="brandEyebrow"></div>
        <div class="title" data-i18n="brandTitle"></div>
      </div>
    </div>
    <button class="langswitch" onclick="showLangGate()" id="langSwitchBtn"></button>
  </div>

  <div class="langgate" id="langGate">
    <div class="langgate-card">
      <div class="langgate-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 4l9 6.5" stroke="#f6f3ec" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 9.5V19a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1V9.5" stroke="#f6f3ec" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="langgate-title">言語を選択してください<br>Please select your language<br>언어를 선택해 주세요<br>请选择语言 ・ 請選擇語言</div>
      <div class="langlist">
        <button class="langbtn" onclick="selectLang('ja')">日本語</button>
        <button class="langbtn" onclick="selectLang('en')">English</button>
        <button class="langbtn" onclick="selectLang('ko')">한국어</button>
        <button class="langbtn" onclick="selectLang('zhCN')">中文（简体）</button>
        <button class="langbtn" onclick="selectLang('zhTW')">中文（繁體）</button>
      </div>
      <div class="langgate-loading" id="langGateLoading" style="display:none;"></div>
    </div>
  </div>

  <div id="mainFlow" style="display:none;">

  <div class="ticket-strip" id="ticketStrip">
    <div class="step active" data-go="1"><span class="num">01</span><span class="label" data-i18n="step1"></span></div>
    <div class="step" data-go="2"><span class="num">02</span><span class="label" data-i18n="step2"></span></div>
    <div class="step" data-go="3"><span class="num">03</span><span class="label" data-i18n="step3"></span></div>
    <div class="step" data-go="4"><span class="num">04</span><span class="label" data-i18n="step4"></span></div>
  </div>

  <div class="card">
    <div class="card-inner">

      <!-- ============ SCREEN 1 : 事前確認フォーム ============ -->
      <div class="screen active" id="screen1">
        <h2 class="scr-title" id="screen1Title"></h2>
        <p class="scr-sub" id="screen1Sub"></p>

        <div class="section">
          <div class="section-head"><span class="tag">STEP 1-A</span><h3 data-i18n="stepATitle"></h3></div>
          <div class="row2">
            <div class="field"><label class="req" data-i18n="labelCheckinDate"></label><input type="date" id="checkinDate"></div>
            <div class="field"><label class="req" data-i18n="labelCheckoutDate"></label><input type="date" id="checkoutDate"></div>
          </div>
          <div class="field">
            <label class="req" data-i18n="stepATitle"></label>
            <input type="number" min="1" value="2" id="guestCount" onchange="renderGuestCards()">
            <div class="hint" data-i18n="guestCountHint"></div>
          </div>
        </div>

        <div class="section">
          <div class="section-head"><span class="tag">STEP 1-B</span><h3 data-i18n="stepBTitle"></h3></div>
          <div id="guestCardsWrap"></div>
        </div>

        <!-- 全員日本国籍の場合のみ表示：代表者の本人確認書類 -->
        <div class="section" id="repIdBlock">
          <div class="section-head"><span class="tag">STEP 1-C</span><h3 data-i18n="repIdTitle"></h3></div>
          <label class="upload-slot" id="repIdUpload" data-sub-key="repIdUploadSub">
            <input type="file" accept="image/*,application/pdf" style="display:none" onchange="handleFileUpload(this,'repIdUpload')">
            <div class="icon"><svg viewBox="0 0 24 24" fill="none"><path d="M12 16V4m0 0L7 9m5-5l5 5M5 20h14" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div class="meta">
              <div class="t" data-i18n="repIdUploadTitle"></div>
              <div class="s" data-i18n="repIdUploadSub"></div>
            </div>
          </label>
          <div class="hint" data-i18n="repIdHint"></div>
        </div>

        <div class="banner" id="step1NoticeBanner"><span>🛈</span><div><b data-i18n="bannerNoticeLabel"></b><span data-i18n="bannerNoticeText"></span></div></div>

        <div class="banner banner-error" id="formError" style="display:none;"></div>

        <button class="btn btn-primary" onclick="goConfirmClick()" data-i18n="btnConfirm"></button>
      </div>

      <!-- ============ SCREEN 2 : 内容確認 ============ -->
      <div class="screen" id="screen2">
        <h2 class="scr-title" id="screen2Title"></h2>
        <p class="scr-sub" data-i18n="reviewSub"></p>

        <div class="section">
          <div class="section-head"><span class="tag" data-i18n="sectionConfirmTag"></span><h3 data-i18n="sectionGuestInfoTitle"></h3></div>
          <div id="reviewSummary"></div>
        </div>

<script>
// Google Apps Script web app URL (backend: Sheets + Drive). See Code.gs.
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzpzVW_xp9i83Ps0Bw4hLlTTh18xpqFF5XvefvbvR-5z6Rb1b4ivYHZAfQLKSA0nUCvXg/exec';

// slotId -> {base64, mimeType, filename} for real file uploads (ID/passport photos)
const uploadedFiles = {};

// when set (arrival day, loaded from the backend), the day-of screen renders
// from this instead of the local input form
let serverGuestData = null;

let editingFromDay4 = false;

function goStep(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen'+n).classList.add('active');
  document.querySelectorAll('.step').forEach(s=>{
    const sn = parseInt(s.dataset.go);
    s.classList.toggle('active', sn===n);
    s.classList.toggle('done', sn<n);
  });
  if(n===1){ updateScreen1Header(); }
  if(n===2){ populateReview('reviewSummary'); updateSendButton(); }
  if(n===4){ resetStayConfirm(); editingFromDay4 = false; }
}

function goEditInfo(){
  editingFromDay4 = true;
  if(ARRIVAL_MODE && serverGuestData){
    prefillFormFromServerData();
  }
  goStep(1);
}

function prefillFormFromServerData(){
  if(!serverGuestData) return;
  const guests = serverGuestData.guests || [];
  const n = Math.max(1, guests.length);

  document.getElementById('checkinDate').value = serverGuestData.checkinDate || '';
  document.getElementById('checkoutDate').value = serverGuestData.checkoutDate || '';
  document.getElementById('guestCount').value = n;
  renderGuestCards();

  const repAddr = guests[0] ? (guests[0].address || '') : '';

  guests.forEach((g, idx)=>{
    const gnum = String(idx + 1);
    const card = document.querySelector(`#guestCardsWrap .guestcard[data-guest="${gnum}"]`);
    if(!card) return;

    card.querySelector('.g-name').value = g.name || '';
    const ageSel = card.querySelector('.g-age');
    if(ageSel) ageSel.value = g.age || '';
    const natSel = card.querySelector('.g-nat');
    if(natSel){ natSel.value = g.nationality || 'JP'; onNatChange(gnum); }
    const passEl = card.querySelector('.g-passno');
    if(passEl) passEl.value = g.passportNo || '';

    if(gnum === '1'){
      document.getElementById('addr-1').value = g.address || '';
      document.getElementById('zip-1').value = g.zip || '';
      document.getElementById('repPhone').value = serverGuestData.repPhone || '';
      document.getElementById('repEmail').value = serverGuestData.repEmail || '';
    } else {
      const sameBox = card.querySelector('.g-same');
      const sameAsRep = !!g.address && g.address === repAddr;
      if(sameBox){
        sameBox.checked = sameAsRep;
        toggleSameAddr(gnum);
      }
      if(!sameAsRep){
        const ownAddr = document.getElementById('addr-'+gnum);
        if(ownAddr) ownAddr.value = g.address || '';
        const ownZip = document.getElementById('zip-'+gnum);
        if(ownZip) ownZip.value = g.zip || '';
      }
    }

    // mark the existing document as already submitted — no re-upload required
    // unless the guest chooses to replace it
    const slotId = gnum === '1' ? 'repIdUpload' : ('passportUpload-'+gnum);
    const slot = document.getElementById(slotId);
    if(slot && g.docUrl){
      slot.classList.add('filled');
      slot.dataset.preexisting = '1';
      const icon = slot.querySelector('.icon');
      if(icon) icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }
  });

  syncAddress();
  updateDocRequirement();
  refreshUploadTexts();
}

// carry edits made on STEP01 back into the in-memory reservation data used by
// STEP04, so the day-of screen reflects the change immediately.
// Note: this updates what's shown on this device only — it does not yet
// re-save the edit to the spreadsheet.
function syncServerDataFromForm(){
  if(!serverGuestData) return;
  const guests = collectGuestsFromDOM();
  const rep = guests.find(g => g.isRep) || guests[0];

  serverGuestData.checkinDate = document.getElementById('checkinDate').value || serverGuestData.checkinDate;
  serverGuestData.checkoutDate = document.getElementById('checkoutDate').value || serverGuestData.checkoutDate;
  if(rep){
    serverGuestData.repName = rep.name;
    serverGuestData.repPhone = rep.phone;
    serverGuestData.repEmail = rep.email;
  }

  const prevGuests = serverGuestData.guests || [];
  serverGuestData.guests = guests.map(g=>{
    const prev = prevGuests[parseInt(g.gnum, 10) - 1] || {};
    return {
      name: g.name,
      age: g.age,
      nationality: g.nat,
      address: g.addr,
      zip: g.zip,
      passportNo: g.passportNo,
      docUrl: prev.docUrl || ''
    };
  });
}

function updateScreen1Header(){
  const titleEl = document.getElementById('screen1Title');
  const subEl = document.getElementById('screen1Sub');
  const noticeEl = document.getElementById('step1NoticeBanner');
  if(editingFromDay4){
    if(titleEl) titleEl.textContent = t('screen1EditTitle');
    if(subEl) subEl.textContent = t('screen1EditSub');
    if(noticeEl) noticeEl.style.display = 'none';
  } else {
    if(titleEl) titleEl.textContent = t('screen1Title');
    if(subEl) subEl.textContent = t('screen1Sub');
    if(noticeEl) noticeEl.style.display = 'flex';
  }
}

function updateSendButton(){
  const btn = document.getElementById('sendOrReturnBtn');
  const bannerEl = document.getElementById('reviewBannerText');
  if(editingFromDay4){
    if(btn){ btn.textContent = t('btnReturnDay4'); btn.onclick = ()=>submitUpdateToHost(); }
    if(bannerEl) bannerEl.textContent = t('reviewBannerEdit');
  } else {
    if(btn){ btn.textContent = t('btnSendHost'); btn.onclick = ()=>submitToHost(); }
    if(bannerEl) bannerEl.textContent = t('reviewBanner');
  }
}

function buildGuestsPayload(){
  const guests = collectGuestsFromDOM();
  return guests.map(g=>{
    const fileKey = g.isRep ? 'repIdUpload' : ('passportUpload-' + g.gnum);
    const file = uploadedFiles[fileKey];
    return {
      name: g.name, age: g.age, nationality: g.nat, address: g.addr, zip: g.zip,
      passportNo: g.passportNo,
      docBase64: file ? file.base64 : '',
      docMimeType: file ? file.mimeType : ''
    };
  });
}

function buildSubmitPayload(){
  const guests = collectGuestsFromDOM();
  const rep = guests.find(g=>g.isRep) || guests[0] || {};
  return {
    action: 'submit',
    checkinDate: document.getElementById('checkinDate').value || '',
    checkoutDate: document.getElementById('checkoutDate').value || '',
    repName: rep.name || '',
    repPhone: rep.phone || '',
    repEmail: rep.email || '',
    repAddress: rep.addr || '',
    guests: buildGuestsPayload()
  };
}

function buildUpdatePayload(){
  const guests = collectGuestsFromDOM();
  const rep = guests.find(g=>g.isRep) || guests[0] || {};
  return {
    action: 'update',
    reservationId: serverGuestData ? serverGuestData.reservationId : '',
    checkinDate: document.getElementById('checkinDate').value || '',
    checkoutDate: document.getElementById('checkoutDate').value || '',
    repName: rep.name || '',
    repPhone: rep.phone || '',
    repEmail: rep.email || '',
    repAddress: rep.addr || '',
    guests: buildGuestsPayload()
  };
}

async function submitToHost(){
  const btn = document.getElementById('sendOrReturnBtn');
  const errEl = document.getElementById('sendErrorBanner');
  if(errEl) errEl.style.display = 'none';
  if(btn){ btn.disabled = true; btn.textContent = t('sending'); }

  try{
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(buildSubmitPayload())
    });
    const data = await res.json();
    if(!data.success) throw new Error(data.error || 'submit failed');
    goStep(3);
  } catch(err){
    console.error(err);
    if(errEl){ errEl.innerHTML = '<span>⚠</span><div>' + t('sendFailed') + '</div>'; errEl.style.display = 'flex'; }
  } finally {
    if(btn){ btn.disabled = false; }
    updateSendButton();
  }
}

async function submitUpdateToHost(){
  const btn = document.getElementById('sendOrReturnBtn');
  const errEl = document.getElementById('sendErrorBanner');
  if(errEl) errEl.style.display = 'none';
  if(btn){ btn.disabled = true; btn.textContent = t('sending'); }

  try{
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(buildUpdatePayload())
    });
    const data = await res.json();
    if(!data.success) throw new Error(data.error || 'update failed');

    // reflect the saved result locally (docUrl values come back from the backend)
    if(serverGuestData){
      if(Array.isArray(data.guests)) serverGuestData.guests = data.guests;
      else syncServerDataFromForm();
      serverGuestData.checkinDate = document.getElementById('checkinDate').value || serverGuestData.checkinDate;
      serverGuestData.checkoutDate = document.getElementById('checkoutDate').value || serverGuestData.checkoutDate;
    }
    goStep(4);
  } catch(err){
    console.error(err);
    if(errEl){ errEl.innerHTML = '<span>⚠</span><div>' + t('sendFailed') + '</div>'; errEl.style.display = 'flex'; }
  } finally {
    if(btn){ btn.disabled = false; }
    updateSendButton();
  }
}

// ---- guest cards (name/nationality/address for everyone, phone+email for rep only) ----
const NAT_CODES = ['JP','VN','CN','KR','TW','US','OTHER'];


function ageOptionsHTML(){
  let opts = `<option value="">${t('ageSelectPlaceholder')}</option>`;
  for(let a=0;a<=100;a++){
    const label = LANG === 'en' ? String(a) : (a + t('ageUnit'));
    opts += `<option value="${a}">${label}</option>`;
  }
  return opts;
}

function natOptionsHTML(){
  return NAT_CODES.map(c=>`<option value="${c}">${natLabel(c)}</option>`).join('');
}

function guestCardHTML(i){
  const isRep = i===1;
  const addressBlock = isRep ? `
        <div class="field" id="zipblock-1">
          <label class="req" data-i18n="labelZip"></label>
          <div class="ziprow">
            <input type="text" class="g-zip" id="zip-1" placeholder="804-0067" maxlength="8" oninput="onZipInput(1)">
            <button type="button" class="zipbtn" onclick="onZipInput(1)" data-i18n="btnZipSearch"></button>
          </div>
          <div class="zipstatus" id="zipstatus-1"></div>
        </div>
        <div class="field"><label class="req" data-i18n="labelAddr"></label><input type="text" class="g-addr" id="addr-1" oninput="syncAddress()" data-i18n-ph="placeholderAddr"></div>
        <div class="row2">
          <div class="field"><label class="req" data-i18n="labelPhone"></label><input type="tel" id="repPhone" placeholder="090-0000-0000"></div>
          <div class="field"><label class="req" data-i18n="labelEmail"></label><input type="email" id="repEmail" placeholder="you@example.com"></div>
        </div>` : `
        <label class="samewrap"><input type="checkbox" class="g-same" checked onchange="toggleSameAddr(${i})"> <span data-i18n="sameAddrCheckbox"></span></label>
        <div class="addr-copy-disp" id="addrDisp-${i}"></div>
        <div class="ownaddr" id="ownaddr-${i}" style="display:none;">
          <div class="field" id="zipblock-${i}">
            <label class="req" data-i18n="labelZip"></label>
            <div class="ziprow">
              <input type="text" class="g-zip" id="zip-${i}" placeholder="804-0067" maxlength="8" oninput="onZipInput(${i})">
              <button type="button" class="zipbtn" onclick="onZipInput(${i})" data-i18n="btnZipSearch"></button>
            </div>
            <div class="zipstatus" id="zipstatus-${i}"></div>
          </div>
          <div class="field"><label class="req" data-i18n="labelAddr"></label><input type="text" class="g-addr" id="addr-${i}" data-i18n-ph="placeholderAddr"></div>
        </div>`;
  return `
    <div class="guestcard" data-guest="${i}">
      <div class="ghead"><span class="gname" data-gnum="${i}" data-rep="${isRep?1:0}"></span></div>

      <div class="field"><label class="req" data-i18n="labelName"></label><input type="text" class="g-name" data-i18n-ph="placeholderName"></div>

      <div class="row2">
        <div class="field"><label class="req" data-i18n="labelAge"></label>
          <select class="g-age">${ageOptionsHTML()}</select>
        </div>
        <div class="field"><label class="req" data-i18n="labelNat"></label>
          <select class="g-nat" onchange="onNatChange(${i})">${natOptionsHTML()}</select>
        </div>
      </div>

      <div class="field g-passport" style="display:none;">
        <label class="req" data-i18n="labelPassport"></label><input type="text" class="g-passno" placeholder="N1234567">
        <label class="upload-slot mt8" id="passportUpload-${i}" data-sub-key="passportUploadSub">
          <input type="file" accept="image/*,application/pdf" style="display:none" onchange="handleFileUpload(this,'passportUpload-${i}')">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none"><path d="M12 16V4m0 0L7 9m5-5l5 5M5 20h14" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="meta"><div class="t" data-i18n="passportUploadTitle"></div><div class="s" data-i18n="passportUploadSub"></div></div>
        </label>
      </div>

      ${addressBlock}
    </div>`;
}

function renderGuestCards(){
  const n = Math.max(1, parseInt(document.getElementById('guestCount').value)||1);
  const wrap = document.getElementById('guestCardsWrap');
  wrap.innerHTML='';
  for(let i=1;i<=n;i++){ wrap.insertAdjacentHTML('beforeend', guestCardHTML(i)); }
  syncAddress();
  updateDocRequirement();
  applyI18n();
}

function toggleSameAddr(i){
  const same = document.querySelector(`#guestCardsWrap .guestcard[data-guest="${i}"] .g-same`).checked;
  document.getElementById('addrDisp-'+i).style.display = same ? 'block':'none';
  document.getElementById('ownaddr-'+i).style.display = same ? 'none':'block';
  if(same) syncAddress();
}

function syncAddress(){
  const repAddr = document.getElementById('addr-1').value;
  document.querySelectorAll('#guestCardsWrap .guestcard').forEach(card=>{
    if(card.dataset.guest==='1') return;
    const sameBox = card.querySelector('.g-same');
    if(sameBox && sameBox.checked){
      const disp = card.querySelector('.addr-copy-disp');
      if(disp) disp.textContent = repAddr ? repAddr : t('addrCopyPlaceholder');
    }
  });
}

async function onZipInput(i){
  const zipEl = document.getElementById('zip-'+i);
  const statusEl = document.getElementById('zipstatus-'+i);
  const addrEl = document.getElementById('addr-'+i);
  const digits = zipEl.value.replace(/[^0-9]/g,'');
  // auto-format as 000-0000
  zipEl.value = digits.length>3 ? digits.slice(0,3)+'-'+digits.slice(3,7) : digits;
  if(digits.length!==7){ statusEl.textContent=''; return; }

  statusEl.textContent = t('zipSearching');
  statusEl.style.color = 'var(--muted)';

  try{
    const res = await fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode=' + digits);
    const data = await res.json();
    const hit = data && data.results && data.results[0];
    if(hit){
      const full = (hit.address1 || '') + (hit.address2 || '') + (hit.address3 || '');
      addrEl.value = full + ' ';
      statusEl.textContent = t('zipFound', {addr: full});
      statusEl.style.color = 'var(--success)';
    } else {
      statusEl.textContent = t('zipNotFound');
      statusEl.style.color = 'var(--danger)';
    }
  } catch(err){
    console.error(err);
    statusEl.textContent = t('zipError');
    statusEl.style.color = 'var(--danger)';
  }

  if(i===1) syncAddress();
}

function onNatChange(i){
  const card = document.querySelector(`#guestCardsWrap .guestcard[data-guest="${i}"]`);
  const isJp = card.querySelector('.g-nat').value === 'JP';
  card.querySelector('.g-passport').style.display = isJp ? 'none' : 'block';
  const zipblock = document.getElementById('zipblock-'+i);
  if(zipblock) zipblock.style.display = isJp ? 'block' : 'none';
  updateDocRequirement();
}

function updateDocRequirement(){
  const repNat = document.querySelector('#guestCardsWrap .guestcard[data-guest="1"] .g-nat');
  const repIsJp = !repNat || repNat.value === 'JP';
  document.getElementById('repIdBlock').style.display = repIsJp ? 'block' : 'none';
}

function validateForm(){
  const errors = [];

  const checkinVal = document.getElementById('checkinDate').value;
  const checkoutVal = document.getElementById('checkoutDate').value;
  if(!checkinVal) errors.push(t('errCheckinDate'));
  if(!checkoutVal) errors.push(t('errCheckoutDate'));
  if(checkinVal && checkoutVal && checkoutVal < checkinVal) errors.push(t('errDateOrder'));

  document.querySelectorAll('#guestCardsWrap .guestcard').forEach(card=>{
    const gnum = card.dataset.guest;
    const isRep = gnum === '1';
    const label = guestLabel(gnum, isRep);

    const name = (card.querySelector('.g-name').value || '').trim();
    if(!name) errors.push(t('errName', {label}));

    const age = (card.querySelector('.g-age').value || '').trim();
    if(!age) errors.push(t('errAge', {label}));

    const nat = card.querySelector('.g-nat').value;
    if(nat !== 'JP'){
      const passno = (card.querySelector('.g-passno').value || '').trim();
      if(!passno) errors.push(t('errPassport', {label}));
    }

    if(isRep){
      if(!(document.getElementById('addr-1').value || '').trim()) errors.push(t('errRepAddr'));
      if(!(document.getElementById('repPhone').value || '').trim()) errors.push(t('errRepPhone'));
      if(!(document.getElementById('repEmail').value || '').trim()) errors.push(t('errRepEmail'));
    } else {
      const sameBox = card.querySelector('.g-same');
      if(sameBox && !sameBox.checked){
        const own = document.getElementById('addr-'+gnum);
        if(!((own ? own.value : '').trim())) errors.push(t('errGuestAddr', {label}));
      }
    }
  });
  return errors;
}

function validateDocs(){
  const cards = [...document.querySelectorAll('#guestCardsWrap .guestcard')];
  const errors = [];

  const repCard = cards.find(c => c.dataset.guest === '1');
  const repIsJp = repCard && repCard.querySelector('.g-nat').value === 'JP';
  if(repIsJp){
    const repUpload = document.getElementById('repIdUpload');
    if(!repUpload.classList.contains('filled')){
      errors.push(t('errRepDoc'));
    }
  }

  cards.filter(c => c.querySelector('.g-nat').value !== 'JP').forEach(c=>{
    const gnum = c.dataset.guest;
    const slot = document.getElementById('passportUpload-'+gnum);
    if(!slot.classList.contains('filled')){
      const gname = (c.querySelector('.g-name').value || '').trim() || guestLabel(gnum, false);
      errors.push(t('errPassportDoc', {name: gname}));
    }
  });

  return errors;
}

function goConfirmClick(){
  const errors = [...validateForm(), ...validateDocs()];
  const errEl = document.getElementById('formError');
  if(errors.length){
    errEl.innerHTML = '<span>⚠</span><div><b>' + t('errorBannerPrefix') + '</b><br>' + errors.join('<br>') + '</div>';
    errEl.style.display = 'flex';
    errEl.scrollIntoView({behavior:'smooth', block:'center'});
    return;
  }
  errEl.style.display = 'none';
  goStep(2);
}

function guestAddress(card){
  const gnum = card.dataset.guest;
  if(gnum === '1'){
    return (document.getElementById('addr-1').value || '').trim() || t('notEntered');
  }
  const sameBox = card.querySelector('.g-same');
  if(sameBox && sameBox.checked){
    return (document.getElementById('addr-1').value || '').trim() || t('notEntered');
  }
  const own = document.getElementById('addr-'+gnum);
  return (own ? own.value : '').trim() || t('notEntered');
}

// Normalized guest list, either read live from the input form (pre-arrival,
// STEP01-03) or from the reservation fetched from the backend (arrival day,
// STEP04 when serverGuestData is set). Both paths produce the same shape.
function collectGuestsFromDOM(){
  return [...document.querySelectorAll('#guestCardsWrap .guestcard')].map(card=>{
    const gnum = card.dataset.guest;
    const isRep = gnum === '1';
    const zipEl = document.getElementById('zip-'+gnum);
    return {
      gnum, isRep,
      name: (card.querySelector('.g-name').value || '').trim(),
      age: (card.querySelector('.g-age').value || '').trim(),
      nat: card.querySelector('.g-nat').value,
      addr: guestAddress(card),
      zip: zipEl ? (zipEl.value || '').trim() : '',
      passportNo: (card.querySelector('.g-passno').value || '').trim(),
      phone: isRep ? (document.getElementById('repPhone').value || '').trim() : '',
      email: isRep ? (document.getElementById('repEmail').value || '').trim() : ''
    };
  });
}

function collectGuestsFromServer(){
  if(!serverGuestData) return [];
  return (serverGuestData.guests || []).map((g, idx)=>({
    gnum: String(idx + 1),
    isRep: idx === 0,
    name: g.name || '',
    age: g.age || '',
    nat: g.nationality || 'JP',
    addr: g.address || '',
    zip: g.zip || '',
    passportNo: g.passportNo || '',
    phone: idx === 0 ? (serverGuestData.repPhone || '') : '',
    email: idx === 0 ? (serverGuestData.repEmail || '') : ''
  }));
}

function currentGuests(forDay){
  if(forDay && ARRIVAL_MODE) return collectGuestsFromServer();
  return collectGuestsFromDOM();
}

function populateReview(targetId){
  const forDay = targetId === 'dayReviewSummary';
  const guests = currentGuests(forDay);
  if(!guests.length){
    document.getElementById(targetId).innerHTML = '';
    return;
  }

  const repName = guests[0].name || t('repGuestLabel');
  const titleEl = document.getElementById('screen2Title');
  if(titleEl) titleEl.textContent = t('reviewTitle', {name: repName});

  const withStatus = forDay;

  let datesBlock = '';
  if(targetId === 'reviewSummary'){
    const checkin = document.getElementById('checkinDate').value || t('notEntered');
    const checkout = document.getElementById('checkoutDate').value || t('notEntered');
    datesBlock = `<div class="guestcard">
      <div class="summary-row"><div class="k">${t('labelCheckinDate')}</div><div class="v">${checkin}</div></div>
      <div class="summary-row"><div class="k">${t('labelCheckoutDate')}</div><div class="v">${checkout}</div></div>
    </div>`;
  } else if(forDay && serverGuestData){
    const checkin = serverGuestData.checkinDate || t('notEntered');
    const checkout = serverGuestData.checkoutDate || t('notEntered');
    datesBlock = `<div class="guestcard">
      <div class="summary-row"><div class="k">${t('labelCheckinDate')}</div><div class="v">${checkin}</div></div>
      <div class="summary-row"><div class="k">${t('labelCheckoutDate')}</div><div class="v">${checkout}</div></div>
    </div>`;
  }

  const blocks = guests.map(g=>{
    const name = g.name || guestLabel(g.gnum, g.isRep);
    const ageDisp = g.age ? (LANG === 'en' ? g.age : (g.age + t('ageUnit'))) : t('notEntered');
    const addr = g.addr || t('notEntered');

    let rows = `
      <div class="summary-row"><div class="k">${t('labelName')}</div><div class="v">${name}</div></div>
      <div class="summary-row"><div class="k">${t('labelAge')}</div><div class="v">${ageDisp}</div></div>
      <div class="summary-row"><div class="k">${t('labelNat')}</div><div class="v">${natLabel(g.nat)}</div></div>
      <div class="summary-row"><div class="k">${t('labelAddr')}</div><div class="v">${addr}</div></div>`;

    if(g.nat !== 'JP'){
      const passno = g.passportNo || t('notEntered');
      rows += `<div class="summary-row"><div class="k">${t('labelPassport')}</div><div class="v">${passno}</div></div>`;
    }
    if(g.isRep){
      const phone = g.phone || t('notEntered');
      const email = g.email || t('notEntered');
      rows += `
        <div class="summary-row"><div class="k">${t('labelPhone')}</div><div class="v">${phone}</div></div>
        <div class="summary-row"><div class="k">${t('labelEmail')}</div><div class="v">${email}</div></div>`;
    }

    const withDocThumb = targetId === 'reviewSummary';

    return `<div class="guestcard">
      <div class="ghead"><span class="gname">${guestLabel(g.gnum, g.isRep)}</span>${withDocThumb ? docThumbHTML(g.gnum, g.isRep) : ''}${withStatus ? faceThumbHTML(g.gnum) : ''}${withStatus ? faceStampHTML(g.gnum) : ''}</div>
      ${rows}
      ${withStatus ? faceRetakeButtonHTML(g.gnum) : ''}
    </div>`;
  });

  document.getElementById(targetId).innerHTML = datesBlock + blocks.join('');
}

function handleFileUpload(inputEl, slotId){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(){
    const result = String(reader.result || '');
    const comma = result.indexOf(',');
    const base64 = comma >= 0 ? result.slice(comma + 1) : '';
    uploadedFiles[slotId] = { base64, mimeType: file.type || 'image/jpeg', filename: file.name };

    const slot = document.getElementById(slotId);
    if(!slot) return;
    slot.classList.add('filled');
    slot.dataset.filename = file.name;
    delete slot.dataset.preexisting;
    slot.querySelector('.icon').innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    refreshUploadTexts();
  };
  reader.onerror = function(){
    alert(t('uploadFailed'));
  };
  reader.readAsDataURL(file);
}

// day-of arrival: guest self-checks their info, completes face auth one guest at a time, then confirms the stay
let dayGuestQueue = [];
let dayGuestIndex = 0;

function faceStatusFor(gnum){
  const idx = dayGuestQueue.findIndex(g => g.gnum === gnum);
  if(idx === -1) return null;
  if(idx < dayGuestIndex) return 'done';
  if(idx === dayGuestIndex) return 'current';
  return 'pending';
}

function faceStampHTML(gnum){
  const status = faceStatusFor(gnum);
  if(!status) return '';
  const key = status === 'done' ? 'faceStatusDone' : status === 'current' ? 'faceStatusCurrent' : 'faceStatusPending';
  return `<span class="gstamp gstamp-${status}">${t(key)}</span>`;
}

function faceRetakeButtonHTML(gnum){
  if(faceStatusFor(gnum) !== 'done') return '';
  return `<button type="button" class="btn btn-ghost mt8" onclick="jumpToGuestCapture('${gnum}')">${t('btnRetakeThisGuest')}</button>`;
}

function faceThumbHTML(gnum){
  const cap = faceCaptures[gnum];
  if(!cap || !cap.dataUrl) return '';
  return `<img class="facethumb" src="${cap.dataUrl}" alt="">`;
}

function docThumbHTML(gnum, isRep){
  const slotId = isRep ? 'repIdUpload' : ('passportUpload-'+gnum);
  const file = uploadedFiles[slotId];
  if(!file || !file.base64) return '';
  if(file.mimeType === 'application/pdf') return '';
  return `<img class="facethumb" src="data:${file.mimeType};base64,${file.base64}" alt="">`;
}

function buildDayGuestQueue(){
  dayGuestQueue = currentGuests(true).map(g=>({
    gnum: g.gnum,
    name: g.name || guestLabel(g.gnum, g.isRep),
    isRep: g.isRep
  }));
  dayGuestIndex = 0;
}

// gnum -> {base64, mimeType} — real arrival-day photos, reviewed by the host later
let faceCaptures = {};

// captured once per arrival-day session, for MLIT non-face-to-face condition B
// (the photo must be confirmable as taken at/near the property)
let arrivalLocation = null;
let arrivalLocationStatus = 'idle'; // idle | requesting | ok | denied | unsupported

function showLocError(key){
  const banner = document.getElementById('locErrorBanner');
  const textEl = document.getElementById('locErrorText');
  if(textEl) textEl.textContent = t(key);
  if(banner) banner.style.display = 'flex';
}

function hideLocError(){
  const banner = document.getElementById('locErrorBanner');
  if(banner) banner.style.display = 'none';
}

function updateLocPermUI(){
  const btn = document.getElementById('locAllowBtn');
  if(btn) btn.style.display = (arrivalLocationStatus === 'ok') ? 'none' : 'flex';
}

function requestArrivalLocation(){
  const el = document.getElementById('locStatus');
  hideLocError();

  return new Promise(resolve=>{
    if(!('geolocation' in navigator)){
      arrivalLocationStatus = 'unsupported';
      if(el) el.textContent = '';
      showLocError('locUnsupportedBannerText');
      updateLocPermUI();
      resolve(false);
      return;
    }
    arrivalLocationStatus = 'requesting';
    if(el) el.textContent = t('locRequesting');
    navigator.geolocation.getCurrentPosition(
      pos=>{
        arrivalLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy };
        arrivalLocationStatus = 'ok';
        const s = document.getElementById('locStatus');
        if(s) s.textContent = t('locOk');
        hideLocError();
        updateLocPermUI();
        resolve(true);
      },
      ()=>{
        arrivalLocationStatus = 'denied';
        const s = document.getElementById('locStatus');
        if(s) s.textContent = '';
        showLocError('locDeniedBannerText');
        updateLocPermUI();
        resolve(false);
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });
}

// Browsers won't show the permission prompt again once a site has been
// explicitly blocked — retrying here only re-checks the current permission,
// it can't force the dialog back open. The button still needs to visibly do
// something (loading state) so the guest knows their tap registered, and the
// banner text explains the manual settings change that's actually required.
async function retryLocation(){
  const btn = document.getElementById('locRetryBtn');
  if(btn){ btn.disabled = true; btn.textContent = t('locRetrying'); }
  await requestArrivalLocation();
  if(btn){ btn.disabled = false; btn.textContent = t('btnRetryLocation'); }
}

function resetStayConfirm(){
  document.getElementById('stayConfirmArea').style.display = 'none';
  document.getElementById('stayConfirmed').style.display = 'none';
  document.getElementById('stayStamp').classList.remove('show');

  buildDayGuestQueue();

  if(!dayGuestQueue.length){
    document.getElementById('faceAuthSection').style.display = 'none';
    document.getElementById('locPermissionArea').style.display = 'none';
    return;
  }

  document.getElementById('locPermissionArea').style.display = 'block';
  updateLocPermUI();

  // resume from the first guest who doesn't have a captured photo yet,
  // rather than wiping already-taken photos every time this screen is re-entered
  const resumeIdx = dayGuestQueue.findIndex(g => !faceCaptures[g.gnum]);
  dayGuestIndex = resumeIdx === -1 ? dayGuestQueue.length : resumeIdx;

  if(dayGuestIndex >= dayGuestQueue.length){
    document.getElementById('faceAuthSection').style.display = 'none';
    document.getElementById('stayConfirmArea').style.display = 'block';
    return;
  }

  document.getElementById('faceAuthSection').style.display = 'block';
  renderFaceStep();
}

function renderFaceStep(){
  const total = dayGuestQueue.length;
  const cur = dayGuestQueue[dayGuestIndex];

  document.getElementById('faceQueueLabel').textContent = t('faceQueueLabel', {n: dayGuestIndex + 1, total, name: cur.name});
  document.getElementById('faceCaptureBtnLabel').textContent = t('faceCaptureBtn', {name: cur.name});
  document.getElementById('faceCaptureBtn').style.display = 'flex';
  document.getElementById('faceConfirmArea').style.display = 'none';
  document.getElementById('faceStatus').textContent = '';
  document.getElementById('camPreview').style.display = 'none';
  document.getElementById('camSilhouette').style.display = 'block';

  populateReview('dayReviewSummary');
}

function relabelFaceStep(){
  if(!dayGuestQueue.length) return;
  const cur = dayGuestQueue[dayGuestIndex];
  if(!cur) return;
  const total = dayGuestQueue.length;

  const label = document.getElementById('faceQueueLabel');
  if(label) label.textContent = t('faceQueueLabel', {n: dayGuestIndex + 1, total, name: cur.name});

  const btnLabel = document.getElementById('faceCaptureBtnLabel');
  if(btnLabel && document.getElementById('faceCaptureBtn').style.display !== 'none'){
    btnLabel.textContent = t('faceCaptureBtn', {name: cur.name});
  }

  const locEl = document.getElementById('locStatus');
  if(locEl){
    if(arrivalLocationStatus === 'ok') locEl.textContent = t('locOk');
    else if(arrivalLocationStatus === 'requesting') locEl.textContent = t('locRequesting');
    else locEl.textContent = '';
  }
  if(arrivalLocationStatus === 'denied') showLocError('locDeniedBannerText');
  else if(arrivalLocationStatus === 'unsupported') showLocError('locUnsupportedBannerText');
  else hideLocError();

  populateReview('dayReviewSummary');
}

function handleFaceCapture(inputEl){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  const cur = dayGuestQueue[dayGuestIndex];

  const reader = new FileReader();
  reader.onload = function(){
    const result = String(reader.result || '');
    const comma = result.indexOf(',');
    const base64 = comma >= 0 ? result.slice(comma + 1) : '';
    faceCaptures[cur.gnum] = { base64, mimeType: file.type || 'image/jpeg', dataUrl: result };

    const flash = document.getElementById('flash');
    flash.style.transition = 'none'; flash.style.opacity = '.9';
    requestAnimationFrame(()=>{
      flash.style.transition = 'opacity .4s';
      flash.style.opacity = '0';
    });

    const preview = document.getElementById('camPreview');
    preview.src = result;
    preview.style.display = 'block';
    document.getElementById('camSilhouette').style.display = 'none';

    document.getElementById('faceStatus').textContent = t('faceCaptured', {name: cur.name});
    document.getElementById('faceCaptureBtn').style.display = 'none';
    document.getElementById('faceConfirmArea').style.display = 'flex';

    populateReview('dayReviewSummary');
  };
  reader.onerror = function(){
    alert(t('uploadFailed'));
  };
  reader.readAsDataURL(file);
  inputEl.value = '';
}

function retakeFace(){
  const cur = dayGuestQueue[dayGuestIndex];
  delete faceCaptures[cur.gnum];

  document.getElementById('faceConfirmArea').style.display = 'none';
  document.getElementById('faceCaptureBtn').style.display = 'flex';
  document.getElementById('camPreview').style.display = 'none';
  document.getElementById('camSilhouette').style.display = 'block';
  document.getElementById('faceStatus').textContent = '';

  populateReview('dayReviewSummary');
}

// moves to the next guest who doesn't have a photo yet, or shows the stay
// confirm button if everyone already has one. Used both for the normal
// forward flow and after jumping back to retake an earlier guest.
function advanceToNextIncomplete(){
  const nextIdx = dayGuestQueue.findIndex(g => !faceCaptures[g.gnum]);
  if(nextIdx === -1){
    dayGuestIndex = dayGuestQueue.length;
    document.getElementById('faceAuthSection').style.display = 'none';
    document.getElementById('stayConfirmArea').style.display = 'block';
  } else {
    dayGuestIndex = nextIdx;
    renderFaceStep();
  }
}

function confirmFaceCapture(){
  document.getElementById('faceConfirmArea').style.display = 'none';
  populateReview('dayReviewSummary');
  advanceToNextIncomplete();
}

// lets the guest tap an already-photographed person in the list to retake
// their photo out of order, without losing anyone else's progress
function jumpToGuestCapture(gnum){
  const idx = dayGuestQueue.findIndex(g => g.gnum === gnum);
  if(idx === -1) return;
  dayGuestIndex = idx;
  document.getElementById('stayConfirmArea').style.display = 'none';
  document.getElementById('faceAuthSection').style.display = 'block';
  renderFaceStep();
  document.getElementById('faceAuthSection').scrollIntoView({behavior:'smooth', block:'start'});
}

function doStayConfirm(){
  document.getElementById('stayConfirmArea').style.display = 'none';
  document.getElementById('stayConfirmed').style.display = 'block';
  requestAnimationFrame(()=>{
    document.getElementById('stayStamp').classList.add('show');
  });

  if(serverGuestData && serverGuestData.reservationId){
    const guestPhotos = Object.keys(faceCaptures).map(gnum=>{
      const g = dayGuestQueue.find(x => x.gnum === gnum);
      return {
        gnum,
        name: g ? g.name : '',
        base64: faceCaptures[gnum].base64,
        mimeType: faceCaptures[gnum].mimeType
      };
    });

    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'checkin',
        reservationId: serverGuestData.reservationId,
        guestPhotos: guestPhotos,
        location: arrivalLocation
      })
    }).catch(err=>console.error(err));
  }
}

function t(key, vars){
  const entry = I18N[key];
  let s = entry ? (entry[LANG] || entry.ja) : key;
  if(vars){
    Object.keys(vars).forEach(k=>{
      s = s.split('{'+k+'}').join(vars[k]);
    });
  }
  return s;
}

function refreshNatOptions(){
  document.querySelectorAll('.g-nat').forEach(sel=>{
    const cur = sel.value;
    sel.innerHTML = natOptionsHTML();
    if(cur) sel.value = cur;
  });
}

function refreshUploadTexts(){
  document.querySelectorAll('.upload-slot').forEach(slot=>{
    const sEl = slot.querySelector('.meta .s');
    if(!sEl) return;
    if(slot.classList.contains('filled')){
      if(slot.dataset.filename){
        sEl.textContent = t('uploadedStatus') + '：' + slot.dataset.filename;
      } else if(slot.dataset.preexisting){
        sEl.textContent = t('uploadedPreviously');
      } else {
        sEl.textContent = t('uploadedStatus');
      }
    } else if(slot.dataset.subKey){
      sEl.textContent = t(slot.dataset.subKey);
    }
  });
}

function refreshAgeOptions(){
  document.querySelectorAll('.g-age').forEach(sel=>{
    const cur = sel.value;
    sel.innerHTML = ageOptionsHTML();
    if(cur) sel.value = cur;
  });
}

function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    el.placeholder = t(el.dataset.i18nPh);
  });
  document.querySelectorAll('.gname[data-gnum]').forEach(el=>{
    el.textContent = guestLabel(el.dataset.gnum, el.dataset.rep === '1');
  });
  document.querySelectorAll('.addr-copy-disp').forEach(el=>{
    const repAddr = (document.getElementById('addr-1') || {}).value || '';
    if(!repAddr) el.textContent = t('addrCopyPlaceholder');
  });
  refreshUploadTexts();
  refreshNatOptions();
  refreshAgeOptions();
}

const LANG_NATIVE_NAME = {ja:'日本語', en:'English', ko:'한국어', zhCN:'中文（简体）', zhTW:'中文（繁體）'};

function setLang(lang){
  LANG = lang;
  document.documentElement.lang = {ja:'ja', en:'en', ko:'ko', zhCN:'zh-CN', zhTW:'zh-TW'}[lang] || 'ja';
  applyI18n();

  const switchBtn = document.getElementById('langSwitchBtn');
  if(switchBtn) switchBtn.textContent = LANG_NATIVE_NAME[lang] || LANG_NATIVE_NAME.ja;

  const activeScreen = document.querySelector('.screen.active');
  if(activeScreen){
    const n = parseInt(activeScreen.id.replace('screen',''));
    if(n === 1){ updateScreen1Header(); }
    if(n === 2){ populateReview('reviewSummary'); updateSendButton(); }
    if(n === 4 && !day4NoReservation){ relabelFaceStep(); populateReview('dayReviewSummary'); }
    if(n === 4 && day4NoReservation){
      const el = document.getElementById('dayReviewSummary');
      if(el) el.innerHTML = '<div class="banner banner-error" style="display:flex;"><span>⚠</span><div>' + t('noReservationFound') + '</div></div>';
    }
  }
}

// door QR uses a fixed URL like .../checkin.html?mode=arrival — this jumps guests
// straight to STEP04 after they pick a language, instead of starting at STEP01.
// In production this URL carries no reservation ID: the backend looks up
// "today's check-in, not yet checked out" on its own (see chat discussion).
const ARRIVAL_MODE = new URLSearchParams(location.search).get('mode') === 'arrival';

const STATUS_CHECKED_IN = 'チェックイン済み';

let day4NoReservation = false;

async function loadTodayReservation(){
  try{
    const res = await fetch(GAS_URL + '?action=today');
    const data = await res.json();
    if(data.success && data.found){
      serverGuestData = data;
      return true;
    }
    return false;
  } catch(err){
    console.error(err);
    return false;
  }
}

function showAlreadyCheckedIn(){
  document.getElementById('faceAuthSection').style.display = 'none';
  document.getElementById('stayConfirmArea').style.display = 'none';
  document.getElementById('stayConfirmed').style.display = 'none';
  document.getElementById('alreadyCheckedInArea').style.display = 'block';
  populateReview('dayReviewSummary');
}

async function selectLang(lang){
  setLang(lang);

  if(ARRIVAL_MODE){
    document.querySelectorAll('.langbtn').forEach(b=>{ b.disabled = true; });
    const loadingEl = document.getElementById('langGateLoading');
    if(loadingEl){ loadingEl.textContent = t('loadingReservation'); loadingEl.style.display = 'block'; }

    const found = await loadTodayReservation();

    document.getElementById('langGate').style.display = 'none';
    document.getElementById('mainFlow').style.display = 'block';

    if(!found){
      day4NoReservation = true;
      goStep(4);
      document.getElementById('faceAuthSection').style.display = 'none';
      const el = document.getElementById('dayReviewSummary');
      if(el) el.innerHTML = '<div class="banner banner-error" style="display:flex;"><span>⚠</span><div>' + t('noReservationFound') + '</div></div>';
      return;
    }

    day4NoReservation = false;

    if(serverGuestData && serverGuestData.status === STATUS_CHECKED_IN){
      goStep(4);
      showAlreadyCheckedIn();
      return;
    }

    goStep(4);
    return;
  }

  document.getElementById('langGate').style.display = 'none';
  document.getElementById('mainFlow').style.display = 'block';
}

function showLangGate(){
  document.getElementById('mainFlow').style.display = 'none';
  document.getElementById('langGate').style.display = 'block';
}

document.addEventListener('DOMContentLoaded', ()=>{
  applyI18n();
  renderGuestCards();
  updateScreen1Header();
  const switchBtn = document.getElementById('langSwitchBtn');
  if(switchBtn) switchBtn.textContent = LANG_NATIVE_NAME[LANG] || LANG_NATIVE_NAME.ja;

  if(ARRIVAL_MODE){
    // hide the pre-arrival steps in the ticket-strip; arrival day starts at STEP04
    document.querySelectorAll('.step[data-go="1"], .step[data-go="2"], .step[data-go="3"]').forEach(s=>{
      s.style.display = 'none';
    });
  } else {
    // hide the arrival-day step during the pre-arrival flow; it's only reached
    // via the door QR (?mode=arrival), not by browsing ahead during input
    document.querySelector('.step[data-go="4"]').style.display = 'none';
  }
});
